<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DreamyHoster</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #07070a;
  color: white;
  overflow-x: hidden;
}

.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  filter: blur(120px);
  border-radius: 50%;
  z-index: 0;
}

.purple { background: purple; top: -100px; left: -100px; opacity: 0.3; }
.cyan { background: cyan; bottom: -100px; right: -100px; opacity: 0.2; }

nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  position: relative;
  z-index: 1;
}

.title {
  font-size: 24px;
  font-weight: bold;
  background: linear-gradient(to right, purple, cyan);
  -webkit-background-clip: text;
  color: transparent;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 12px;
  border: none;
  background: rgba(0,0,0,0.4);
  color: white;
}

button {
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: linear-gradient(to right, purple, cyan);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}
</style>

</head>

<body>

<div class="glow purple"></div>
<div class="glow cyan"></div>

<nav>
  <div class="title">DreamyHoster</div>
  <button>Login (UI only)</button>
</nav>

<div class="container">

  <h1>Create Minecraft Server</h1>

  <div class="card">

    <label>Server Name</label>
    <input placeholder="My Awesome Server"/>

    <label>Version</label>
    <select>
      <option>1.19</option>
      <option>1.20</option>
      <option>1.21.11</option>
    </select>

    <label>Software</label>
    <select>
      <option>Vanilla</option>
      <option>Fabric</option>
      <option>Forge</option>
    </select>

    <button onclick="alert('UI only — no backend yet')">
      Create Server
    </button>

  </div>

</div>

</body>
</html>
