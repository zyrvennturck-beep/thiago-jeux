<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thiago Jeux</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0a2a43, #1e5f9a);
  color: white;
  overflow: hidden;
}

/* animated particles */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

.center {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
}

.box {
  border: 2px solid white;
  padding: 30px;
  border-radius: 12px;
  display: inline-block;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  50% { transform: translateY(-10px); }
}

h1 {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.search {
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

.btn {
  margin-top: 15px;
  padding: 10px 20px;
  border: 2px solid white;
  background: transparent;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.page {
  display: none;
}

iframe {
  width: 100vw;
  height: 100vh;
  border: none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- MAIN PAGE -->
<div id="home" class="center">
  <div class="box">
    <h1>
      Thiago Jeux
      <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="20">
    </h1>

    <input class="search" id="search" placeholder="Search or enter URL">

    <br>

    <button class="btn" onclick="goGame()">Games</button>
  </div>
</div>

<!-- GAME PAGE -->
<div id="gamePage" class="page">
  <img src="https://tse4.mm.bing.net/th/id/OIP.x2QH3XaNtGXsYqJFnc8eIgHaHa?r=0&w=640&h=640&rs=1&pid=ImgDetMain&o=7&rm=3" width="60" style="position:absolute;top:10px;left:10px;">
  
  <iframe src="https://jbluebird.github.io/Among-Us-Online/game/amongus.html"></iframe>
</div>

<script>
// SEARCH
document.getElementById("search").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    let q = this.value;
    if (q.startsWith("http")) {
      location.href = q;
    } else {
      location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
    }
  }
});

// SWITCH PAGE
function goGame() {
  document.getElementById("home").style.display = "none";
  document.getElementById("gamePage").style.display = "block";
}

// ANIMATED BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.y += 0.3;
    if (p.y > canvas.height) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
