<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiago Jeux</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0a2a43, #1e5f9a);
  color: white;
  overflow: hidden;
}

/* animated background */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* CENTER BOX (LOWERED) */
.center {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 75%; /* lowered for iPad */
  transform: translateY(-50%);
}

/* BOX */
.box {
  border: 2px solid white;
  padding: 30px;
  border-radius: 12px;
  display: inline-block;
  animation: float 3s ease-in-out infinite;
  max-width: 90vw;
}

@keyframes float {
  50% { transform: translateY(-10px); }
}

/* TITLE */
h1 {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 28px;
}

/* SEARCH BAR */
.search {
  padding: 12px;
  width: 260px;
  max-width: 70vw;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  padding: 10px 20px;
  border: 2px solid white;
  background: transparent;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.btn:hover {
  background: rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="center">
  <div class="box">
    <h1>
      Thiago Jeux
      <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="22">
    </h1>

    <input 
      class="search" 
      id="search" 
      placeholder="Search or enter URL"
    >

    <br>

    <button class="btn">Games</button>
  </div>
</div>

<script>
// SEARCH BAR
document.getElementById("search").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    let q = this.value;
    if (q.startsWith("http")) {
      location.href = q;
    } else {
      location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
    }
  }
});

// RESPONSIVE CANVAS
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// PARTICLES
let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 2
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.y += 0.3;
    if (p.y > canvas.height) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
